<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick Combat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="settings.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 900, H = 480;
canvas.width = W; canvas.height = H;

const GROUND = 400;

// ── Input ─────────────────────────────────────────────────────
const K  = {};
const KJ = {};
window.addEventListener('keydown', e => {
  if (!K[e.code]) KJ[e.code] = true;
  K[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => delete K[e.code]);

const held    = (action) => (KEYBINDS[action] || []).some(c => K[c]);
const pressed = (action) => (KEYBINDS[action] || []).some(c => KJ[c]);

// ── Mouse ─────────────────────────────────────────────────────
let mouseX = 0, mouseY = 0, mouseClicked = false;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('click', () => { mouseClicked = true; });

// ── UI helpers ────────────────────────────────────────────────
function drawButton(text, x, y, w, h) {
  const hovered = mouseX >= x && mouseX <= x + w && mouseY >= y && mouseY <= y + h;
  const clicked = hovered && mouseClicked;

  ctx.fillStyle = hovered ? '#ddd' : '#fff';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = '#000';
  ctx.font = '20px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w / 2, y + h / 2);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  return clicked;
}

// ── Sprite Animation System ──────────────────────────────────

// Sprite sheet definitions
// Each animation is a single-row PNG in sprites/ folder.
// frameW/frameH = size of one frame. frames = total frame count.
const SPRITE_DEFS = {
  idle:         { src: 'sprites/idle.png',         frames: 1,  frameW: 64, frameH: 128, fps: 1  },
  walk:         { src: 'sprites/walk.png',         frames: 8,  frameW: 64, frameH: 128, fps: 12 },
  light_attack: { src: 'sprites/light_attack.png', frames: 6,  frameW: 64, frameH: 128, fps: 14 },
  heavy_attack: { src: 'sprites/heavy_attack.png', frames: 8,  frameW: 64, frameH: 128, fps: 10 },
  block:        { src: 'sprites/block.png',        frames: 1,  frameW: 64, frameH: 128, fps: 1  },
};

// Load sprite images (non-blocking; missing files gracefully fall back)
const spriteImages = {};
for (const [name, def] of Object.entries(SPRITE_DEFS)) {
  const img = new Image();
  img.src = def.src;
  img._loaded = false;
  img._failed = false;
  img.onload = () => { img._loaded = true; };
  img.onerror = () => { img._failed = true; };
  spriteImages[name] = img;
}

// Placeholder colors per animation (for when sprites aren't loaded yet)
const PLACEHOLDER_COLORS = {
  idle:         '#4488cc',
  walk:         '#44aa44',
  light_attack: '#cc8844',
  heavy_attack: '#cc4444',
  block:        '#8844cc',
};

// Animator: manages current animation, frame, and timing
function createAnimator() {
  return {
    current: 'idle',
    frame: 0,
    elapsed: 0,

    play(name) {
      if (name === this.current) return;
      this.current = name;
      this.frame = 0;
      this.elapsed = 0;
    },

    update(dt) {
      const def = SPRITE_DEFS[this.current];
      if (!def || def.frames <= 1) return;

      this.elapsed += dt;
      const frameDur = 1 / def.fps;
      if (this.elapsed >= frameDur) {
        this.elapsed -= frameDur;
        this.frame = (this.frame + 1) % def.frames;
      }
    },

    // Draw at (x, y) where y = bottom-center of sprite
    draw(ctx, x, y) {
      const name = this.current;
      const def  = SPRITE_DEFS[name];
      if (!def) return;

      const img = spriteImages[name];
      const fw  = def.frameW;
      const fh  = def.frameH;

      // Top-left corner (anchor = bottom-center)
      const dx = Math.round(x - fw / 2);
      const dy = Math.round(y - fh);

      if (img && img._loaded) {
        // Draw from sprite sheet: single row, frame index = column
        const sx = this.frame * fw;
        ctx.drawImage(img, sx, 0, fw, fh, dx, dy, fw, fh);
      } else {
        // Placeholder: colored rectangle with label
        const color = PLACEHOLDER_COLORS[name] || '#888';
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.35;
        ctx.fillRect(dx, dy, fw, fh);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.strokeRect(dx, dy, fw, fh);

        // Label
        ctx.fillStyle = '#000';
        ctx.font = 'bold 11px Courier New';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(name, x, y - fh / 2 - 8);

        // Frame counter
        ctx.font = '10px Courier New';
        ctx.fillText('frame ' + this.frame + '/' + def.frames, x, y - fh / 2 + 8);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      }
    }
  };
}

// ── Game state ────────────────────────────────────────────────
let state = 'MENU'; // MENU, PLAY, PAUSE
let playerX = W / 2;
let lastTime = 0;
const playerAnim = createAnimator();

// ── Main loop ─────────────────────────────────────────────────
function loop(timestamp) {
  const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  if (state === 'MENU') {
    // Title
    ctx.fillStyle = '#000';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Stick Figure Combat', W / 2, H / 2 - 60);
    ctx.textAlign = 'left';

    // Start button
    const bw = 160, bh = 50;
    const bx = W / 2 - bw / 2, by = H / 2;
    if (drawButton('Start', bx, by, bw, bh)) {
      state = 'PLAY';
      playerX = W / 2;
      playerAnim.play('idle');
    }
  }

  else if (state === 'PLAY' || state === 'PAUSE') {
    // Ground
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();

    // Movement & animation state
    if (state === 'PLAY') {
      const moving = held('moveLeft') || held('moveRight');
      if (held('moveLeft'))  playerX -= 3;
      if (held('moveRight')) playerX += 3;
      playerX = Math.max(20, Math.min(W - 20, playerX));

      playerAnim.play(moving ? 'walk' : 'idle');
      playerAnim.update(dt);
    }

    // Draw player
    playerAnim.draw(ctx, playerX, GROUND);

    // Escape toggles pause
    if (KJ['Escape']) {
      state = state === 'PLAY' ? 'PAUSE' : 'PLAY';
    }

    // Pause overlay
    if (state === 'PAUSE') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, W, H);

      const bw = 160, bh = 50;
      const cx = W / 2 - bw / 2;

      if (drawButton('Options', cx, H / 2 - 35, bw, bh)) {
        // does nothing for now
      }
      if (drawButton('Quit', cx, H / 2 + 35, bw, bh)) {
        state = 'MENU';
      }
    }
  }

  mouseClicked = false;
  for (const k in KJ) delete KJ[k];
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
