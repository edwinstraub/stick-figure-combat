<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick Combat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="settings.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 900, H = 480;
canvas.width = W; canvas.height = H;

const GROUND = 400;

// ── Input ─────────────────────────────────────────────────────
const K  = {};
const KJ = {};
window.addEventListener('keydown', e => {
  if (!K[e.code]) KJ[e.code] = true;
  K[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => delete K[e.code]);

const held    = (action) => (KEYBINDS[action] || []).some(c => K[c]);
const pressed = (action) => (KEYBINDS[action] || []).some(c => KJ[c]);

// ── Mouse ─────────────────────────────────────────────────────
let mouseX = 0, mouseY = 0, mouseClicked = false;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('click', () => { mouseClicked = true; });

// ── UI helpers ────────────────────────────────────────────────
function drawButton(text, x, y, w, h) {
  const hovered = mouseX >= x && mouseX <= x + w && mouseY >= y && mouseY <= y + h;
  const clicked = hovered && mouseClicked;

  ctx.fillStyle = hovered ? '#ddd' : '#fff';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = '#000';
  ctx.font = '20px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w / 2, y + h / 2);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  return clicked;
}

// ── Stick figure drawing ──────────────────────────────────────
function seg(x1, y1, x2, y2) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

function drawStickFigure(x, footY) {
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const hipY  = footY - 56;
  const neckY = hipY - 32;
  const headY = neckY - 22;

  // head
  ctx.beginPath();
  ctx.arc(x, headY, 11, 0, Math.PI * 2);
  ctx.stroke();

  // torso
  seg(x, neckY, x, hipY);

  // arms
  seg(x, neckY, x - 18, hipY - 8);
  seg(x, neckY, x + 18, hipY - 8);

  // legs
  seg(x, hipY, x - 14, footY);
  seg(x, hipY, x + 14, footY);
}

// ── Game state ────────────────────────────────────────────────
let state = 'MENU'; // MENU, PLAY, PAUSE
let playerX = W / 2;

// ── Main loop ─────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  if (state === 'MENU') {
    // Title
    ctx.fillStyle = '#000';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Stick Figure Combat', W / 2, H / 2 - 60);
    ctx.textAlign = 'left';

    // Start button
    const bw = 160, bh = 50;
    const bx = W / 2 - bw / 2, by = H / 2;
    if (drawButton('Start', bx, by, bw, bh)) {
      state = 'PLAY';
      playerX = W / 2;
    }
  }

  else if (state === 'PLAY' || state === 'PAUSE') {
    // Ground
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    seg(0, GROUND, W, GROUND);

    // Player
    drawStickFigure(playerX, GROUND);

    // Movement
    if (state === 'PLAY') {
      if (held('moveLeft'))  playerX -= 3;
      if (held('moveRight')) playerX += 1;
      playerX = Math.max(20, Math.min(W - 20, playerX));
    }

    // Escape toggles pause
    if (KJ['Escape']) {
      state = state === 'PLAY' ? 'PAUSE' : 'PLAY';
    }

    // Pause overlay
    if (state === 'PAUSE') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, W, H);

      const bw = 160, bh = 50;
      const cx = W / 2 - bw / 2;

      if (drawButton('Options', cx, H / 2 - 35, bw, bh)) {
        // does nothing for now
      }
      if (drawButton('Quit', cx, H / 2 + 35, bw, bh)) {
        state = 'MENU';
      }
    }
  }

  mouseClicked = false;
  for (const k in KJ) delete KJ[k];
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
